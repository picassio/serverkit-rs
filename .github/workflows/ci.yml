name: CI

on:
  push:
    branches: [main, rust-rewrite]
  pull_request:
    branches: [main, rust-rewrite]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  route-ledger:
    name: API route ledger gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify frontend route ledger
        run: python3 scripts/check_route_ledger.py --check-ledger

  backend:
    name: Rust backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend-rs/target
          key: cargo-${{ runner.os }}-${{ hashFiles('backend-rs/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build (release)
        run: cargo build --release --bin sk-server

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  sidecar:
    name: AI sidecar (install + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rs/ai-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci || npm install --no-audit --no-fund
      - name: Syntax check
        run: node --check server.mjs && node --check tools.mjs && node --check extensions/cc-patch.mjs
