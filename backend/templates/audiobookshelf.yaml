id: audiobookshelf
name: Audiobookshelf
version: "1.0"
description: Self-hosted server for managing and streaming your audiobooks, podcasts, and ebooks.
icon: data:image/svg+xml;base64,
website: https://www.audiobookshelf.org
documentation: https://www.audiobookshelf.org/docs
categories:
  - media
  - audiobooks

variables:
  - name: HTTP_PORT
    description: Port for the Audiobookshelf web UI (auto-assigned)
    type: port
    default: "80"
    hidden: true

ports:
  - port: "${HTTP_PORT}"
    protocol: http
    description: Audiobookshelf Web UI

requirements:
  memory: 512MB
  storage: 2GB

compose:
  services:
    audiobookshelf:
      image: ghcr.io/advplyr/audiobookshelf:2.34.0
      container_name: ${APP_NAME}
      restart: unless-stopped
      ports:
        - "${HTTP_PORT}:80"
      environment:
        TZ: "Etc/UTC"
      volumes:
        - audiobookshelf-config:/config
        - audiobookshelf-metadata:/metadata
        - audiobookshelf-audiobooks:/audiobooks
        - audiobookshelf-podcasts:/podcasts
      healthcheck:
        test: ["CMD-SHELL", "wget --quiet --tries=1 --timeout=5 http://localhost:80/ping -O /dev/null || exit 1"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 15s

  volumes:
    audiobookshelf-config:
    audiobookshelf-metadata:
    audiobookshelf-audiobooks:
    audiobookshelf-podcasts:

post_install: |
  Audiobookshelf is installed and running!

  - Web UI: http://your-server:${HTTP_PORT}

  Open the web UI and create your admin account on first launch. Then add a
  library pointing at /audiobooks (audiobooks/ebooks) or /podcasts to start
  scanning and streaming your collection.
