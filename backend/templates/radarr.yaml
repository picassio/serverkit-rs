id: radarr
name: Radarr
version: "1.0"
description: PVR for movies that monitors, grabs, sorts, and renames films automatically
icon: data:image/svg+xml;base64,
website: https://radarr.video
documentation: https://wiki.servarr.com/radarr
categories:
  - media
  - automation

variables:
  - name: HTTP_PORT
    description: Port for the Radarr web UI (auto-assigned)
    type: port
    default: "7878"
    hidden: true

ports:
  - port: "${HTTP_PORT}"
    protocol: http
    description: Radarr Web UI

requirements:
  memory: 512MB
  storage: 2GB

compose:
  services:
    radarr:
      image: lscr.io/linuxserver/radarr:latest
      container_name: ${APP_NAME}
      restart: unless-stopped
      ports:
        - "${HTTP_PORT}:7878"
      environment:
        PUID: "1000"
        PGID: "1000"
        TZ: "Etc/UTC"
      volumes:
        - radarr-config:/config
        - radarr-media:/media
        - radarr-downloads:/downloads
      networks:
        - default
        - media
      healthcheck:
        test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7878/ping"]
        interval: 30s
        timeout: 10s
        retries: 5
        start_period: 30s
  volumes:
    radarr-config:
    radarr-media:
    radarr-downloads:
  networks:
    media:
      name: serverkit-media

post_install: |
  Radarr is installed and running!

  - Web UI: http://your-server:${HTTP_PORT}
  - Add your indexers via Prowlarr and a download client (e.g. qBittorrent),
    then point Radarr at them to start managing your movie library.
  - This app shares the "serverkit-media" Docker network, so Radarr can reach
    the other media apps (Prowlarr, qBittorrent, etc.) directly by their
    container names — no extra networking setup required.
