id: searxng
name: SearXNG
version: "1.0"
description: Privacy-respecting metasearch engine that aggregates results from many sources without tracking you.
icon: data:image/svg+xml;base64,
website: https://docs.searxng.org
documentation: https://docs.searxng.org/admin/installation-docker.html
categories:
  - search
  - privacy

variables:
  - name: HTTP_PORT
    description: Port for the SearXNG web UI (auto-assigned)
    type: port
    default: "8080"
    hidden: true
  - name: SECRET_KEY
    description: Secret key used to sign SearXNG sessions (auto-generated)
    type: random
    length: 48
    hidden: true

ports:
  - port: "${HTTP_PORT}"
    protocol: http
    description: SearXNG Web UI

requirements:
  memory: 512MB
  storage: 1GB

compose:
  services:
    searxng:
      image: searxng/searxng:latest
      container_name: ${APP_NAME}
      restart: unless-stopped
      ports:
        - "${HTTP_PORT}:8080"
      environment:
        SEARXNG_BASE_URL: "http://localhost:${HTTP_PORT}/"
        SEARXNG_SECRET: "${SECRET_KEY}"
        SEARXNG_REDIS_URL: "redis://redis:6379/0"
      volumes:
        - searxng-config:/etc/searxng
      cap_add:
        - CHOWN
        - SETGID
        - SETUID
      depends_on:
        - redis
      healthcheck:
        test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
        interval: 10s
        timeout: 10s
        retries: 5
        start_period: 20s
    redis:
      image: valkey/valkey:8-alpine
      container_name: ${APP_NAME}-redis
      restart: unless-stopped
      command: valkey-server --save 30 1 --loglevel warning
      volumes:
        - searxng-redis:/data
      healthcheck:
        test: ["CMD", "valkey-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

  volumes:
    searxng-config:
    searxng-redis:

post_install: |
  SearXNG is installed and running!

  - Web UI: http://your-server:${HTTP_PORT}

  The first start writes a default configuration to /etc/searxng (the searxng-config
  volume). To enable the JSON API for programmatic use, add `- json` under
  `search.formats` in /etc/searxng/settings.yml, then restart the container.
