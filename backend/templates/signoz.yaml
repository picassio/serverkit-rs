id: signoz
name: SigNoz
version: "1.0"
description: OpenTelemetry-native observability platform for traces, metrics, and logs (an open-source APM alternative to Datadog).
icon: data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBvbHlsaW5lIHBvaW50cz0iMjIgMTIgMTggMTIgMTUgMjEgOSAzIDYgMTIgMiAxMiIvPjwvc3ZnPg==
website: https://signoz.io
documentation: https://signoz.io/docs/introduction/
categories:
  - monitoring
  - observability
  - apm

variables:
  - name: HTTP_PORT
    description: Port for the SigNoz web UI (auto-assigned)
    type: port
    default: "8080"
    hidden: true
  - name: JWT_SECRET
    description: Secret used to sign SigNoz session tokens (auto-generated)
    type: random
    length: 64
    hidden: true

ports:
  - port: "${HTTP_PORT}"
    protocol: http
    description: SigNoz Web UI
  - port: "4317"
    protocol: tcp
    description: OTLP gRPC ingestion endpoint
  - port: "4318"
    protocol: http
    description: OTLP HTTP ingestion endpoint

requirements:
  memory: 2GB
  storage: 10GB

compose:
  services:
    init-clickhouse:
      image: clickhouse/clickhouse-server:25.5.6-alpine
      container_name: ${APP_NAME}-init-clickhouse
      restart: on-failure
      command:
        - bash
        - -c
        - |
          version="v0.0.1"
          node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
          node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
          echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
          cd /tmp
          wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
          tar -xvzf histogram-quantile.tar.gz
          mkdir -p /var/lib/clickhouse/user_scripts/histogramQuantile
          mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
      volumes:
        - signoz-clickhouse:/var/lib/clickhouse/

    zookeeper:
      image: signoz/zookeeper:3.9.3
      container_name: ${APP_NAME}-zookeeper
      restart: unless-stopped
      user: root
      environment:
        ALLOW_ANONYMOUS_LOGIN: "yes"
        ZOO_AUTOPURGE_INTERVAL: "1"
        ZOO_ENABLE_PROMETHEUS_METRICS: "yes"
        ZOO_PROMETHEUS_METRICS_PORT_NUMBER: "9141"
      volumes:
        - signoz-zookeeper:/bitnami/zookeeper
      healthcheck:
        test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
        interval: 30s
        timeout: 5s
        retries: 3

    clickhouse:
      image: clickhouse/clickhouse-server:25.5.6-alpine
      container_name: ${APP_NAME}-clickhouse
      restart: unless-stopped
      tty: true
      depends_on:
        init-clickhouse:
          condition: service_completed_successfully
        zookeeper:
          condition: service_healthy
      environment:
        CLICKHOUSE_SKIP_USER_SETUP: "1"
      ulimits:
        nproc: 65535
        nofile:
          soft: 262144
          hard: 262144
      volumes:
        - signoz-clickhouse:/var/lib/clickhouse/
      healthcheck:
        test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
        interval: 30s
        timeout: 5s
        retries: 3

    schema-migrator-sync:
      image: signoz/signoz-schema-migrator:v0.129.7
      container_name: ${APP_NAME}-schema-migrator-sync
      restart: on-failure
      command:
        - sync
        - --dsn=tcp://clickhouse:9000
        - --up=
      depends_on:
        clickhouse:
          condition: service_healthy

    schema-migrator-async:
      image: signoz/signoz-schema-migrator:v0.129.7
      container_name: ${APP_NAME}-schema-migrator-async
      restart: on-failure
      command:
        - async
        - --dsn=tcp://clickhouse:9000
        - --up=
      depends_on:
        clickhouse:
          condition: service_healthy
        schema-migrator-sync:
          condition: service_completed_successfully

    signoz:
      image: signoz/signoz:v0.97.1
      container_name: ${APP_NAME}
      restart: unless-stopped
      command:
        - --config=/root/config/prometheus.yml
      depends_on:
        clickhouse:
          condition: service_healthy
        schema-migrator-sync:
          condition: service_completed_successfully
      ports:
        - "${HTTP_PORT}:8080"
      environment:
        SIGNOZ_JWT_SECRET: "${JWT_SECRET}"
        SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: "tcp://clickhouse:9000"
        SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
        DASHBOARDS_PATH: /root/config/dashboards
        STORAGE: clickhouse
        GODEBUG: netdns=go
        DEPLOYMENT_TYPE: docker-standalone-amd
        SIGNOZ_STATSREPORTER_ENABLED: "true"
        SIGNOZ_EMAILING_ENABLED: "false"
        SIGNOZ_ALERTMANAGER_PROVIDER: signoz
        DOT_METRICS_ENABLED: "true"
      volumes:
        - signoz-sqlite:/var/lib/signoz/
      healthcheck:
        test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
        interval: 30s
        timeout: 5s
        retries: 3

    otel-collector:
      image: signoz/signoz-otel-collector:v0.129.7
      container_name: ${APP_NAME}-otel-collector
      restart: unless-stopped
      command:
        - --config=/etc/otel-collector-config.yaml
        - --manager-config=/etc/manager-config.yaml
        - --copy-path=/var/tmp/collector-config.yaml
        - --feature-gates=-pkg.translator.prometheus.NormalizeName
      depends_on:
        clickhouse:
          condition: service_healthy
        schema-migrator-sync:
          condition: service_completed_successfully
        signoz:
          condition: service_healthy
      ports:
        - "4317:4317"
        - "4318:4318"
      environment:
        OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
        LOW_CARDINAL_EXCEPTION_GROUPING: "false"
      healthcheck:
        test: ["CMD-SHELL", "exec 6<> /dev/tcp/localhost/13133"]
        interval: 30s
        timeout: 5s
        retries: 3

  volumes:
    signoz-clickhouse:
    signoz-zookeeper:
    signoz-sqlite:

files:
  - path: /etc/clickhouse-server/custom-function.xml
    content: |
      <functions>
          <function>
              <type>executable</type>
              <name>histogramQuantile</name>
              <return_type>Float64</return_type>
              <argument>
                  <type>Array(Float64)</type>
                  <name>buckets</name>
              </argument>
              <argument>
                  <type>Array(Float64)</type>
                  <name>counts</name>
              </argument>
              <argument>
                  <type>Float64</type>
                  <name>quantile</name>
              </argument>
              <format>CSV</format>
              <command>./histogramQuantile</command>
          </function>
      </functions>

  - path: /etc/clickhouse-server/config.d/cluster.xml
    content: |
      <?xml version="1.0"?>
      <clickhouse>
          <zookeeper>
              <node index="1">
                  <host>zookeeper</host>
                  <port>2181</port>
              </node>
          </zookeeper>
          <remote_servers>
              <cluster>
                  <shard>
                      <replica>
                          <host>clickhouse</host>
                          <port>9000</port>
                      </replica>
                  </shard>
              </cluster>
          </remote_servers>
      </clickhouse>

  - path: /etc/clickhouse-server/users.xml
    content: |
      <?xml version="1.0"?>
      <clickhouse>
          <profiles>
              <default>
                  <max_memory_usage>10000000000</max_memory_usage>
                  <load_balancing>random</load_balancing>
              </default>
              <readonly>
                  <readonly>1</readonly>
              </readonly>
          </profiles>
          <users>
              <default>
                  <password></password>
                  <networks>
                      <ip>::/0</ip>
                  </networks>
                  <profile>default</profile>
                  <quota>default</quota>
              </default>
          </users>
          <quotas>
              <default>
                  <interval>
                      <duration>3600</duration>
                      <queries>0</queries>
                      <errors>0</errors>
                      <result_rows>0</result_rows>
                      <read_rows>0</read_rows>
                      <execution_time>0</execution_time>
                  </interval>
              </default>
          </quotas>
      </clickhouse>

  - path: /etc/clickhouse-server/config.xml
    content: |
      <?xml version="1.0"?>
      <clickhouse>
        <max_connections>4096</max_connections>
        <keep_alive_timeout>3</keep_alive_timeout>
        <max_concurrent_queries>100</max_concurrent_queries>
        <mark_cache_size>5368709120</mark_cache_size>
        <mmap_cache_size>1000</mmap_cache_size>
        <compiled_expression_cache_size>134217728</compiled_expression_cache_size>
        <compiled_expression_cache_elements_size>10000</compiled_expression_cache_elements_size>
        <custom_settings_prefixes></custom_settings_prefixes>
        <dictionaries_config>*_dictionary.xml</dictionaries_config>
        <user_defined_executable_functions_config>*function.xml</user_defined_executable_functions_config>
        <user_scripts_path>/var/lib/clickhouse/user_scripts/</user_scripts_path>
        <http_port>8123</http_port>
        <tcp_port>9000</tcp_port>
        <mysql_port>9004</mysql_port>
        <postgresql_port>9005</postgresql_port>
        <interserver_http_port>9009</interserver_http_port>
        <logger>
          <level>information</level>
          <formatting>
            <type>json</type>
          </formatting>
        </logger>
        <macros>
          <shard>01</shard>
          <replica>example01-01-1</replica>
        </macros>
        <prometheus>
          <endpoint>/metrics</endpoint>
          <port>9363</port>
          <metrics>true</metrics>
          <events>true</events>
          <asynchronous_metrics>true</asynchronous_metrics>
          <status_info>true</status_info>
        </prometheus>
        <opentelemetry_span_log>
          <engine>engine MergeTree
                  partition by toYYYYMM(finish_date)
                  order by (finish_date, finish_time_us, trace_id)</engine>
        </opentelemetry_span_log>
        <query_masking_rules>
          <rule>
            <name>hide encrypt/decrypt arguments</name>
            <regexp>((?:aes_)?(?:encrypt|decrypt)(?:_mysql)?)\s*\(\s*(?:'(?:\\'|.)+'|.*?)\s*\)</regexp>
            <replace>\1(???)</replace>
          </rule>
        </query_masking_rules>
        <send_crash_reports>
          <enabled>false</enabled>
          <anonymize>false</anonymize>
          <endpoint>https://6f33034cfe684dd7a3ab9875e57b1c8d@o388870.ingest.sentry.io/5226277</endpoint>
        </send_crash_reports>
        <merge_tree_metadata_cache>
          <lru_cache_size>268435456</lru_cache_size>
          <continue_if_corrupted>true</continue_if_corrupted>
        </merge_tree_metadata_cache>
        <user_directories>
          <users_xml>
              <path>users.xml</path>
          </users_xml>
          <local_directory>
              <path>/var/lib/clickhouse/access/</path>
          </local_directory>
        </user_directories>
        <default_profile>default</default_profile>
          <distributed_ddl>
              <path>/clickhouse/task_queue/ddl</path>
          </distributed_ddl>
      </clickhouse>

  - path: /root/config/prometheus.yml
    content: |
      global:
        scrape_interval:     5s
        evaluation_interval: 15s

      alerting:
        alertmanagers:
        - static_configs:
          - targets:
            - alertmanager:9093

      rule_files: []

      scrape_configs: []

      remote_read:
        - url: tcp://clickhouse:9000/signoz_metrics

  - path: /etc/otel-collector-config.yaml
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        prometheus:
          config:
            global:
              scrape_interval: 60s
            scrape_configs:
              - job_name: otel-collector
                static_configs:
                - targets:
                    - localhost:8888
                  labels:
                    job_name: otel-collector
      processors:
        batch:
          send_batch_size: 10000
          send_batch_max_size: 11000
          timeout: 10s
        resourcedetection:
          detectors: [env, system]
          timeout: 2s
        signozspanmetrics/delta:
          metrics_exporter: signozclickhousemetrics
          metrics_flush_interval: 60s
          latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s ]
          dimensions_cache_size: 100000
          aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
          enable_exp_histogram: true
          dimensions:
            - name: service.namespace
              default: default
            - name: deployment.environment
              default: default
            - name: signoz.collector.id
            - name: service.version
            - name: browser.platform
            - name: browser.mobile
            - name: k8s.cluster.name
            - name: k8s.node.name
            - name: k8s.namespace.name
            - name: host.name
            - name: host.type
            - name: container.name
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        pprof:
          endpoint: 0.0.0.0:1777
      exporters:
        clickhousetraces:
          datasource: tcp://clickhouse:9000/signoz_traces
          low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
          use_new_schema: true
        signozclickhousemetrics:
          dsn: tcp://clickhouse:9000/signoz_metrics
        clickhouselogsexporter:
          dsn: tcp://clickhouse:9000/signoz_logs
          timeout: 10s
          use_new_schema: true
      service:
        telemetry:
          logs:
            encoding: json
        extensions:
          - health_check
          - pprof
        pipelines:
          traces:
            receivers: [otlp]
            processors: [signozspanmetrics/delta, batch]
            exporters: [clickhousetraces]
          metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [signozclickhousemetrics]
          metrics/prometheus:
            receivers: [prometheus]
            processors: [batch]
            exporters: [signozclickhousemetrics]
          logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [clickhouselogsexporter]

  - path: /etc/manager-config.yaml
    content: |
      server_endpoint: ws://signoz:4320/v1/opamp

post_install: |
  SigNoz is installed and running!

  - Web UI: http://your-server:${HTTP_PORT}
  - There is NO login by default. Open the UI and create the FIRST account;
    that user becomes the instance admin.

  Send telemetry from your apps (OpenTelemetry / OTLP):
  - gRPC:  http://your-server:4317
  - HTTP:  http://your-server:4318
    Point your OTLP exporter's endpoint at one of the above
    (e.g. OTEL_EXPORTER_OTLP_ENDPOINT=http://your-server:4317).

  For production:
  - Attach a real domain to this app to serve the UI over a public URL
    instead of host:${HTTP_PORT}.

  This stack runs several containers: the SigNoz query service + UI, a
  ClickHouse columnar store (with a ZooKeeper coordinator and a one-shot
  init helper), schema migrators that prepare the ClickHouse schema, and
  an OpenTelemetry Collector that ingests your traces, metrics, and logs.
  ClickHouse is memory-hungry, so give this app at least 2GB of RAM.
