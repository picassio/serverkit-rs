id: sonarr
name: Sonarr
version: "1.0"
description: PVR for TV series that monitors, grabs, sorts, and renames episodes automatically
icon: data:image/svg+xml;base64,
website: https://sonarr.tv
documentation: https://wiki.servarr.com/sonarr
categories:
  - media
  - automation

variables:
  - name: HTTP_PORT
    description: Port for the Sonarr web UI (auto-assigned)
    type: port
    default: "8989"
    hidden: true

ports:
  - port: "${HTTP_PORT}"
    protocol: http
    description: Sonarr Web UI

requirements:
  memory: 512MB
  storage: 2GB

compose:
  services:
    sonarr:
      image: lscr.io/linuxserver/sonarr:latest
      container_name: ${APP_NAME}
      restart: unless-stopped
      ports:
        - "${HTTP_PORT}:8989"
      environment:
        PUID: "1000"
        PGID: "1000"
        TZ: "Etc/UTC"
      volumes:
        - sonarr-config:/config
        - sonarr-media:/media
        - sonarr-downloads:/downloads
      networks:
        - default
        - media
      healthcheck:
        test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8989/ping"]
        interval: 30s
        timeout: 10s
        retries: 5
        start_period: 30s
  volumes:
    sonarr-config:
    sonarr-media:
    sonarr-downloads:
  networks:
    media:
      name: serverkit-media

post_install: |
  Sonarr is installed and running!

  - Web UI: http://your-server:${HTTP_PORT}
  - Add your indexers via Prowlarr and a download client (e.g. qBittorrent),
    then point Sonarr at them to start managing your TV library.
  - This app shares the "serverkit-media" Docker network, so Sonarr can reach
    the other media apps (Prowlarr, qBittorrent, etc.) directly by their
    container names — no extra networking setup required.
