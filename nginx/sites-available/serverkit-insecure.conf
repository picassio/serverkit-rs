# ServerKit - Insecure HTTP fallback configuration
# /etc/nginx/sites-available/serverkit-insecure.conf
#
# ⚠️  WARNING: This configuration does NOT use SSL/TLS. All traffic between
#     browsers and this server is unencrypted. Passwords, tokens, and any
#     data sent to the panel or hosted apps can be read by anyone on the
#     network path.
#
#     This mode exists only as a convenience for local networks, temporary
#     testing, or situations where you cannot obtain certificates. It is
#     strongly recommended to switch to the secure config as soon as possible.
#
# To switch to HTTPS later:
#   1. Obtain certificates (Let's Encrypt or Cloudflare Origin CA).
#   2. Replace this file with serverkit.conf:
#        sudo cp /opt/serverkit/nginx/sites-available/serverkit.conf \
#                /etc/nginx/sites-available/serverkit.conf
#   3. Update the certificate paths inside that file.
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ServerKit frontend — served directly by host nginx from the built SPA
    # bundle (no container). Path tracks the /opt/serverkit symlink so blue/green
    # updates swap assets atomically; the installer rewrites it for a custom
    # SERVERKIT_DIR.
    root /opt/serverkit/frontend/dist;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        # expires -1 → Cache-Control: no-cache — the entrypoint must
        # revalidate every load or a cached index.html references hashed
        # assets deleted by the next blue/green switch.
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    include /etc/nginx/serverkit-locations/*.conf;

    location ~ /\. {
        deny all;
    }

    location ~* \.(env|git|gitignore|dockerignore)$ {
        deny all;
    }
}

include /etc/nginx/serverkit-conf.d/*.conf;
